  - url: https://edrys-labs.github.io/module-markdown-it/index.html
    config:
      content: >-
        ## 🚌 The CAN Bus System: The Nervous System of Modern Technology


        Imagine you’re sitting in a modern car. When you step on the brake, the
        brake light has to come on, the ABS has to be ready, and the engine may
        need to be decoupled. If each of these control units were connected with
        its own cable, a car would consist of nothing but cable harnesses
        weighing several metric tons.


        This is where the **CAN Bus (Controller Area Network)** comes into play.
        It acts like a digital conference room: All control units are conacted
        to the a single bus to share information between them. 



        * **Priority matters:** Every message has an ID. The lower the ID, the
        more important the message is (e.g. the brakes take priority over the
        radio volume).

        * **Robust and secure:** The CAN bus is extremely resistant to
        interference and is therefore used wherever reliability is critical –
        such as in cars, planes, medical equipment, and factories.

        ---


        ## 🛠️ Your remote project: The CAN Bus Sniffer


        In this Remote Lab we will simulate such a vehicle network. Via the
        **edrys-lite** platform you are able to access two connected STM32
        Microcontrollers:


        1. **The Sender (Simulator):** This Microntroller siimulates a driving
        car, continuesly sending CAN messages (e.g. Speed, engine temperature,
        indicator status) over the bus.

        2. **The Reciever (Your Interface):** This Microcontroller listen to the
        CAN Bus and redirects the raw data into the edrys interface.


        To start, click on the three stripes in the top left corner, and select
        a station.


        You will need a Chromium based browser (such as Google Chrome) to use
        the remote lab effectively. This lab has been optomised for 1920:1080
        screens. 


        ---


        ## 💻 Your task: Read, write, and analyze CAN messages!


        We have prepared three tasks in ascending order of difficulty for you to
        master, ranging from simple instructions all  the way up to priority
        haching, an edge case scenario. To start programming just use the code
        editor to your left, and when you're ready, hit the "execute" button at
        the bottom to upload and execute your code.  If you ever accidentally
        delete an important bit of code, you can reset the editor with the
        button at the bottom.


        **Here are your programm's tasks:**


        1. **Write (Beginner):** Use the code example to learn how to send
        simple instructions to open and close the bonnet or turn the headlights
        on and off. Experiment around with different timings and message order
        to familiarise yourself with sending CAN messages and the STM Syntax.

        2. **Read and analyse:** Read the incoming engine speed transmitions and
        convert them into human readable speed values (assume a tire diameter of
        860 mm). Implement a function such that the bonnet automatically closes
        and the lights turn on when the vehicle starts moving.

        3. **Priority Hacking:** This one requires a bit of explanation. As
        described above, each message has an ID which determines its priority.
        To ensure high priority messages don't get drowned out, devices that
        want to send on the bus also listen to it, and if the message they want
        to send is of higher priority then the one currently transmitted, it
        will start transmitting its own, with the other device detecting this
        and stopping its transmission. Knowing this, your task is to drown out
        the rain sensor messages (ID = 0x600), which are transmitted once a
        second, by constantly sending abs release and/or apply messages (ID =
        0x86).
