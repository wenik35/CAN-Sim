  - id: d7c85cab-bc48-4983-b2c2-1a673d559ba7
    url: https://edrys-labs.github.io/module-markdown-it/index.html
    config:
      content: >
        ## Documentation

        This is a quick overview over important commands and variables, as well
        as a list of implemented CAN messages. 

        ### Important Commands and variables

        ```HAL_CAN_AddTxMessage(&hcan1, &TxHeader, TxData, &TxMailbox)```


        Adds a message to be send to the CAN interface

        - &hcan1 - CAN handler to use, in this case "hcan1"

        - &TxHeader - Header of the CAN message, explained further down.

        - TxData - CAN message data, explained further down.

        - &TxMailbox - CAN Mailbox to use, in this case "TxMailbox"


        ```HAL_CAN_RxFifo0MsgPendingCallback(CAN_HandleTypeDef *hcan)```


        Interrupt for incoming CAN message. When a CAN message is received, the
        main function will be paused and any code inside this function will run
        before main is resumed.


        ```HAL_Delay(int time)```


        Causes the controller to wait the specified amount in milliseconds


        ```void init(void)```


        Initialises the Microcontroller and its peripherals. (See bottom for
        full command)


        ```CAN_TxHeaderTypeDef TxHeader```


        Header of an outgoing can message


        - TxHeader.StdId - CAN message ID

        - TxHeader.DLC - Size of message data


        ```uint8_t TxData[8]```


        Array containing the outgoing CAN message data


        ```CAN_RxHeaderTypeDef RxHeader```


        Header of an incoming can message


        - RxHeader.StdId - CAN message ID

        - RxHeader.DLC - Size of message data


        ```uint8_t RxData[8]```


        Array containing the incoming CAN message data






        ```c

        void init(void){
              HAL_Init();

              /* Configure the system clock */
              SystemClock_Config();

              /* Initialize all configured peripherals */
              MX_GPIO_Init();
              MX_CAN1_Init();
              MX_I2C1_Init();
              MX_I2S3_Init();
              MX_SPI1_Init();
              MX_USB_HOST_Init();
              /* USER CODE BEGIN 2 */

              // --- STEP 1: CAN Filter Configuration ---
              // Setting all IDs and Masks to 0 accepts EVERY incoming message for testing purposes.
              CAN_FilterTypeDef sFilterConfig;

              sFilterConfig.FilterBank = 0;
              sFilterConfig.FilterMode = CAN_FILTERMODE_IDMASK;
              sFilterConfig.FilterScale = CAN_FILTERSCALE_32BIT;
              sFilterConfig.FilterIdHigh = 0x0000;
              sFilterConfig.FilterIdLow = 0x0000;
              sFilterConfig.FilterMaskIdHigh = 0x0000;
              sFilterConfig.FilterMaskIdLow = 0x0000;
              sFilterConfig.FilterFIFOAssignment = CAN_RX_FIFO0;
              sFilterConfig.FilterActivation = ENABLE;
              sFilterConfig.SlaveStartFilterBank = 14;

              if (HAL_CAN_ConfigFilter(&hcan1, &sFilterConfig) != HAL_OK)
              {
                  Error_Handler();
              }

              // --- STEP 2: Start the CAN Peripheral ---
              if (HAL_CAN_Start(&hcan1) != HAL_OK)
              {
                  Error_Handler();
              }

              // --- STEP 3: Activate RX Interrupt Notifications ---
              if (HAL_CAN_ActivateNotification(&hcan1, CAN_IT_RX_FIFO0_MSG_PENDING) != HAL_OK)
              {
                  Error_Handler();
              }

              // --- STEP 4: Prepare Tx Message Header Attributes ---
              // TxHeader.StdId = 0x102;          // Example Message Identifier (Standard ID)
              TxHeader.RTR = CAN_RTR_DATA;     // We are sending data frames, not remote requests
              TxHeader.IDE = CAN_ID_STD;       // Standard 11-bit identifier format
              // TxHeader.DLC = 4;                // Sending 4 bytes of data payload
              TxHeader.TransmitGlobalTime = DISABLE;
        }

        ```
